                                                        <td className="p-3 text-center">{item.count}</td>
                                                        <td className="p-3 text-center">{item.quantity || 1}</td>
                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                            {itemIndex === 0 && utils.money(order.etsyPayout)}
                                                        </td>
                                                        <td className="p-3 text-right text-red-600 font-medium">
                                                            {itemIndex === 0 && `-${utils.money(order.shippingCost)}`}
                                                        </td>
                                                        <td className="p-3 text-right font-medium">
                                                            {itemIndex === 0 && utils.money(order.productionCost)}
                                                        </td>
                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                            {itemIndex === 0 && utils.money(order.tjShare)}
                                                        </td>
                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                            {itemIndex === 0 && utils.money(order.joshShare)}
                                                        </td>
                                                        <td className="p-3 text-center">
                                                            {itemIndex === 0 && (
                                                                <span className={`px-2 py-1 rounded-full text-xs font-medium ${order.status === 'Paid' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}`}>
                                                                    {order.status}
                                                                </span>
                                                            )}
                                                        </td>
                                                        <td className="p-3 text-center">
                                                            {itemIndex === 0 && (
                                                                <div className="flex gap-1 justify-center">
                                                                    <button 
                                                                        onClick={() => startEditOrder(order)}
                                                                        className="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs transition-colors duration-200"
                                                                    >
                                                                        Edit
                                                                    </button>
                                                                    {order.status === 'Unpaid' && (
                                                                        <button 
                                                                            onClick={() => markOrderPaid(order.id)}
                                                                            className="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs transition-colors duration-200"
                                                                        >
                                                                            Mark Paid
                                                                        </button>
                                                                    )}
                                                                    <button 
                                                                        onClick={() => deleteOrder(order.id)}
                                                                        className="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs transition-colors duration-200"
                                                                    >
                                                                        Delete
                                                                    </button>
                                                                </div>
                                                            )}
                                                        </td>
                                                    </tr>
                                                ));
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Payouts Section */}
                    {payoutsByDate.length > 0 && (
                        <div className="mb-6">
                            <h3 className="text-lg font-semibold mb-4 text-green-600">Payouts</h3>
                            <div className="space-y-4">
                                {payoutsByDate.map((payout) => {
                                    const payoutKey = payout.payoutId || payout.date; // Use payoutId if available, fallback to date
                                    return (
                                    <div key={payoutKey} className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
                                        <div 
                                            className="p-4 cursor-pointer hover:bg-gray-50 transition-colors flex justify-between items-center"
                                            onClick={() => togglePayoutExpansion(payoutKey)}
                                        >
                                            <div className="flex items-center gap-4">
                                                <div className="text-lg font-semibold text-gray-800">
                                                    {new Date(payout.date).toLocaleDateString()}
                                                </div>
                                                <div className="flex gap-6 text-sm">
                                                    <span className="text-green-600 font-medium">
                                                        Etsy: {utils.money(payout.totalEtsyPayout)}
                                                    </span>
                                                    <span className="text-green-600 font-medium">
                                                        TJ: {utils.money(payout.totalTjShare)}
                                                    </span>
                                                    <span className="text-green-600 font-medium">
                                                        Josh: {utils.money(payout.totalJoshShare)}
                                                    </span>
                                                    <span className="text-gray-600">
                                                        Production: {utils.money(payout.totalProductionCost)}
                                                    </span>
                                                    <span className="text-gray-600">
                                                        Orders: {payout.orders.length}
                                                    </span>
                                                </div>
                                            </div>
                                            <button className="text-gray-500 hover:text-gray-700 transition-colors">
                                                {expandedPayouts.has(payoutKey) ? '▼' : '▶'}
                                            </button>
                                        </div>
                                        
                                        {expandedPayouts.has(payoutKey) && (
                                            <div className="border-t border-gray-200">
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-sm">
                                                        <thead className="bg-gray-50">
                                                            <tr>
                                                                <th className="p-3 text-left font-medium">Source</th>
                                                                <th className="p-3 text-left font-medium">Order #</th>
                                                                <th className="p-3 text-left font-medium">Product</th>
                                                                <th className="p-3 text-center font-medium">Count</th>
                                                                <th className="p-3 text-center font-medium">Quantity</th>
                                                                <th className="p-3 text-right font-medium">Payout</th>
                                                                <th className="p-3 text-right font-medium">Ship Cost</th>
                                                                <th className="p-3 text-right font-medium">Production Cost</th>
                                                                <th className="p-3 text-right font-medium">TJ</th>
                                                                <th className="p-3 text-right font-medium">Josh</th>
                                                                <th className="p-3 text-center font-medium">Actions</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {payout.orders.map((order) => {
                                                                const orderItems = order.items || [{ productTitle: order.product || 'Legacy Product', count: order.count || 0, quantity: 1 }];
                                                                return orderItems.map((item, itemIndex) => (
                                                                    <tr key={`${order.id}-${itemIndex}`} className={`border-b transition-colors ${
                                                                        order.source === 'Etsy' ? 'bg-orange-50 hover:bg-orange-100' : 
                                                                        order.source === 'Website' ? 'bg-blue-50 hover:bg-blue-100' : 
                                                                        'hover:bg-gray-50'
                                                                    }`}>
                                                                        <td className="p-3 font-medium">
                                                                            {itemIndex === 0 && (
                                                                                <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                                                    order.source === 'Etsy' ? 'bg-orange-100 text-orange-800' : 
                                                                                    order.source === 'Website' ? 'bg-blue-100 text-blue-800' : 
                                                                                    'bg-gray-100 text-gray-800'
                                                                                }`}>
                                                                                    {order.source || 'Etsy'}
                                                                                </span>
                                                                            )}
                                                                        </td>
                                                                        <td className="p-3 font-medium">
                                                                            {itemIndex === 0 && order.orderNumber}
                                                                        </td>
                                                                        <td className="p-3">{item.productTitle}</td>
                                                                        <td className="p-3 text-center">{item.count}</td>
                                                                        <td className="p-3 text-center">{item.quantity || 1}</td>
                                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                                            {itemIndex === 0 && utils.money(order.etsyPayout)}
                                                                        </td>
                                                                        <td className="p-3 text-right text-red-600 font-medium">
                                                                            {itemIndex === 0 && `-${utils.money(order.shippingCost)}`}
                                                                        </td>
                                                                        <td className="p-3 text-right font-medium">
                                                                            {itemIndex === 0 && utils.money(order.productionCost)}
                                                                        </td>
                                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                                            {itemIndex === 0 && utils.money(order.tjShare)}
                                                                        </td>
                                                                        <td className="p-3 text-right text-green-600 font-medium">
                                                                            {itemIndex === 0 && utils.money(order.joshShare)}
                                                                        </td>
                                                                        <td className="p-3 text-center">
                                                                            {itemIndex === 0 && (
                                                                                <div className="flex gap-1 justify-center">
                                                                                    <button 
                                                                                        onClick={() => startEditOrder(order)}
                                                                                        className="bg-blue-600 hover:bg-blue-700 text-white px-2 py-1 rounded text-xs transition-colors duration-200"
                                                                                    >
                                                                                        Edit
                                                                                    </button>
                                                                                    <button 
                                                                                        onClick={() => deleteOrder(order.id)}
                                                                                        className="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs transition-colors duration-200"
                                                                                    >
                                                                                        Delete
                                                                                    </button>
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                ));
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ManageTab = ({ state, dispatch }) => {
            const [roll, setRoll] = useState("");
            const [brands, setBrands] = useState(state.brands.join("\n"));
            const [styles, setStyles] = useState(state.styles.join("\n"));
            const [packagingOptions, setPackagingOptions] = useState(state.packagingOptions.join("\n"));
            const [multipliers, setMultipliers] = useState(JSON.stringify(state.multipliers, null, 2));

            const addRollCost = useCallback(() => {
                const value = utils.validateNumber(roll);
                if (value <= 0) {
                    alert("Please enter a valid roll cost");
                    return;
                }
                const rollCost = { id: utils.uid(), value, date: utils.today() };
                dispatch({ type: ACTIONS.ADD_ROLL_COST, rollCost });
                setRoll("");
            }, [roll, dispatch]);

            const saveBrands = useCallback(() => {
                const brandList = brands.split("\n").map((x) => x.trim()).filter(Boolean);
                if (brandList.length === 0) {
                    alert("Please enter at least one brand");
                    return;
                }
                dispatch({ type: ACTIONS.SET_LIST, key: "brands", list: brandList });
                alert("Brands saved successfully!");
            }, [brands, dispatch]);

            const saveStyles = useCallback(() => {
                const styleList = styles.split("\n").map((x) => x.trim()).filter(Boolean);
                if (styleList.length === 0) {
                    alert("Please enter at least one style");
                    return;
                }
                dispatch({ type: ACTIONS.SET_LIST, key: "styles", list: styleList });
                alert("Styles saved successfully!");
            }, [styles, dispatch]);

            const savePackagingOptions = useCallback(() => {
                const packagingList = packagingOptions.split("\n").map((x) => x.trim()).filter(Boolean);
                if (packagingList.length === 0) {
                    alert("Please enter at least one packaging option");
                    return;
                }
                dispatch({ type: ACTIONS.SET_LIST, key: "packagingOptions", list: packagingList });
                alert("Packaging options saved successfully!");
            }, [packagingOptions, dispatch]);

            const saveMultipliers = useCallback(() => {
                try {
                    const parsed = JSON.parse(multipliers);
                    dispatch({ type: ACTIONS.SET_VALUE, key: "multipliers", value: parsed });
                    alert("Multipliers saved successfully!");
                } catch (error) {
                    alert("Invalid JSON format: " + error.message);
                }
            }, [multipliers, dispatch]);

            return (
                <div>
                    <h2 className="text-2xl font-bold mb-6 text-gray-800">Manage Settings</h2>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">Roll Costs</h3>
                            <div className="mb-4">
                                <input
                                    type="number"
                                    value={roll}
                                    onChange={(e) => setRoll(e.target.value)}
                                    placeholder="Enter roll cost"
                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                />
                                <button onClick={addRollCost} className="mt-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Add Roll Cost</button>
                            </div>
                            <div className="space-y-2">
                                {state.rollCosts.map((cost) => (
                                    <div key={cost.id} className="flex justify-between items-center p-2 bg-gray-50 rounded">
                                        <span>{cost.date}</span>
                                        <span className="font-medium">{utils.money(cost.value)}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">Brands</h3>
                            <textarea
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 h-40 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                value={brands}
                                onChange={(e) => setBrands(e.target.value)}
                                placeholder="Enter brands, one per line"
                            />
                            <button onClick={saveBrands} className="mt-3 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Save</button>
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">Styles</h3>
                            <textarea
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 h-40 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                value={styles}
                                onChange={(e) => setStyles(e.target.value)}
                                placeholder="Enter styles, one per line"
                            />
                            <button onClick={saveStyles} className="mt-3 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Save</button>
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">Packaging Options</h3>
                            <textarea
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 h-40 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                value={packagingOptions}
                                onChange={(e) => setPackagingOptions(e.target.value)}
                                placeholder="Enter packaging options, one per line"
                            />
                            <button onClick={savePackagingOptions} className="mt-3 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Save</button>
                        </div>

                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200 lg:col-span-2">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">Multipliers</h3>
                            <textarea
                                className="w-full border border-gray-300 rounded-lg px-3 py-2 h-60 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm"
                                value={multipliers}
                                onChange={(e) => setMultipliers(e.target.value)}
                                placeholder="Enter multipliers as JSON"
                            />
                            <button onClick={saveMultipliers} className="mt-3 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Save</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [state, dispatch] = useReducer(reducer, defaultState);
            const [tab, setTab] = useState("products");
            const [isLoading, setIsLoading] = useState(true);
            const [saveStatus, setSaveStatus] = useState("ready"); // "ready", "saving", "saved", "error"

            useEffect(() => {
                const initializeApp = async () => {
                    try {
                        const loadedState = await loadState();
                        dispatch({ type: ACTIONS.INITIALIZE, payload: loadedState });
                    } catch (error) {
                        console.error("Failed to load state:", error);
                    } finally {
                        setIsLoading(false);
                    }
                };
                initializeApp();
            }, []);

            useEffect(() => {
                if (!isLoading) {
                    setSaveStatus("saving");
                    saveState(state).then(() => {
                        setSaveStatus("saved");
                        // Clear the "saved" status after 2 seconds
                        setTimeout(() => setSaveStatus("ready"), 2000);
                    }).catch(() => {
                        setSaveStatus("error");
                        // Clear the "error" status after 5 seconds
                        setTimeout(() => setSaveStatus("ready"), 5000);
                    });
                }
            }, [state, isLoading]);

            const tabs = [["products", "Products"], ["orders", "Orders"], ["packaging", "Packaging"], ["manage", "Manage"]];

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <p className="text-gray-600">Loading...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <header className="bg-white shadow-sm border-b border-gray-200">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-16">
                                <img src="assets/logo.png" alt="Deliciosa Decor" className="h-10" />
                                <div className="flex items-center space-x-8">
                                    <nav className="flex space-x-8">
                                        {tabs.map(([key, label]) => (
                                            <button
                                                key={key}
                                                onClick={() => setTab(key)}
                                                className={`px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200 ${
                                                    tab === key
                                                        ? "bg-blue-100 text-blue-700"
                                                        : "text-gray-500 hover:text-gray-700 hover:bg-gray-100"
                                                }`}
                                            >
                                                {label}
                                            </button>
                                        ))}
                                    </nav>
                                    <div className="flex items-center">
                                        {saveStatus === "saving" && (
                                            <div className="flex items-center text-sm text-blue-600">
                                                <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600 mr-2"></div>
                                                Saving...
                                            </div>
                                        )}
                                        {saveStatus === "saved" && (
                                            <div className="flex items-center text-sm text-green-600">
                                                <svg className="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                                    <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                                </svg>
                                                Saved
                                            </div>
                                        )}
                                        {saveStatus === "error" && (
                                            <div className="flex items-center text-sm text-red-600">
                                                <svg className="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                                    <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clipRule="evenodd" />
                                                </svg>
                                                Save Error
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        {tab === "products" && <ProductsTab state={state} dispatch={dispatch} />}
                        {tab === "orders" && <OrdersTab state={state} dispatch={dispatch} />}
                        {tab === "packaging" && <PackagingTab state={state} dispatch={dispatch} />}
                        {tab === "manage" && <ManageTab state={state} dispatch={dispatch} />}
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
