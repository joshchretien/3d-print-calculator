<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Print Pricing Calculator</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useReducer, useEffect, useMemo, useCallback, memo } = React;

        const CONSTANTS = {
            LS_KEY: "print-calculator-v3.3", // Data preservation test - v2
            DEFAULT_ROLL_COST: 25,
            ESTIMATED_TIME_PER_UNIT: 10.12,
            PREMIUM_8MM_MULTIPLIER: 2.5,
            PREMIUM_8MM_THRESHOLD: 60,
            PREMIUM_8MM_SMALL_COUNTS: [1, 5, 10, 30],
            DISCOUNT_PERCENTAGE: 0.75,
            TJ_SHARE_PERCENTAGE: 0.7,
            DEFAULT_BRANDS: ["Govee", "Eufy", "Nanoleaf"],
            DEFAULT_STYLES: ["Advanced", "8MM"],
            PACKAGING_OPTIONS: ["WT-ENV", "OR-ENV", "BLK-ENV", "6x6x6", "7x7x7", "18x12x2"]
        };

        const DEFAULT_MULTIPLIERS = {
            "1|5|30|60|90|120": { 1: 50.5, 5: 35.5, 30: 25.5, 60: 18.5, 90: 16.5, 120: 14.5 },
            "1|5|12|36|72|108": { 1: 50.5, 5: 35.5, 12: 30.5, 36: 25.5, 72: 22.5, 108: 20.5 },
            "adv-1|5|30|60|90|120": { 1: 20.5, 5: 12.5, 30: 8.5, 60: 7.5, 90: 6.5, 120: 6 },
            "adv-1|5|12|36|72|108": { 1: 20.5, 5: 12.5, 12: 10.5, 36: 7.5, 72: 7.5, 108: 6.5 },
            "Power Supply": { 1: 60 },
            "Prism": { 12: 15, 36: 19.5, 54: 11.5, 72: 10.75 },
            "Nanoleaf Advanced": { 1: 19.5, 30: 8 },
            "Nanoleaf 8MM": { 1: 49.5, 30: 22 }
        };

        const utils = {
            uid: () => Math.random().toString(36).slice(2, 10),
            money: (n) => {
                const value = Number(n || 0);
                return `$${value.toFixed(2)}`;
            },
            today: () => new Date().toISOString().slice(0, 10),
            now: () => new Date().toISOString(),
            pad2: (n) => String(n).padStart(2, "0"),
            estTime: (count) => {
                const minutes = count * CONSTANTS.ESTIMATED_TIME_PER_UNIT;
                const hours = Math.floor(minutes / 60);
                const mins = Math.floor(minutes % 60);
                const secs = Math.round((minutes * 60) % 60);
                return `${utils.pad2(hours)}:${utils.pad2(mins)}:${utils.pad2(secs)}`;
            },
            validateNumber: (value) => {
                const num = Number(value);
                return isNaN(num) ? 0 : num;
            }
        };

        const stripAdv = (key) => String(key || "").replace(/^adv-/, "");

        const ensurePresetForStyle = (style, preset, multipliers) => {
            const isAdv = String(style || "").toLowerCase().startsWith("adv");
            if (isAdv && !String(preset).startsWith("adv-") && multipliers["adv-" + preset]) {
                return "adv-" + preset;
            }
            if (!isAdv && String(preset).startsWith("adv-")) {
                const bare = stripAdv(preset);
                if (multipliers[bare]) return bare;
            }
            return preset;
        };

        const countsFromPreset = (preset) => {
            if (preset === "Power Supply") {
                return [1];
            }
            if (preset === "Prism") {
                return [12, 36, 54, 72];
            }
            if (preset === "nanoleaf-30" || preset === "Nanoleaf Advanced" || preset === "Nanoleaf 8MM") {
                return [1, 30];
            }
            return stripAdv(preset).split("|").map((c) => parseInt(String(c).trim(), 10)).filter((c) => !isNaN(c) && c > 0);
        };

        const titleOf = (product) => {
            const parts = [product?.brand, product?.model].filter(Boolean);
            const title = parts.join(" ");
            return product?.style ? `${title} — ${product.style}` : title;
        };

        const ACTIONS = {
            ADD_PRODUCT: "ADD_PRODUCT",
            REMOVE_PRODUCT: "REMOVE_PRODUCT",
            UPDATE_PRODUCT: "UPDATE_PRODUCT",
            SET_LIST: "SET_LIST",
            ADD_ROLL_COST: "ADD_ROLL_COST",
            SET_VALUE: "SET_VALUE",
            ADD_ORDER: "ADD_ORDER",
            UPDATE_ORDER: "UPDATE_ORDER",
            DELETE_ORDER: "DELETE_ORDER",
            BULK_MARK_PAID: "BULK_MARK_PAID",
            INITIALIZE: "INITIALIZE"
        };

        const defaultState = {
            products: [],
            brands: [...CONSTANTS.DEFAULT_BRANDS],
            styles: [...CONSTANTS.DEFAULT_STYLES],
            rollCosts: [{ id: utils.uid(), value: CONSTANTS.DEFAULT_ROLL_COST, date: utils.today() }],
            multipliers: { ...DEFAULT_MULTIPLIERS },
            orders: [],
            packagingOptions: [...CONSTANTS.PACKAGING_OPTIONS]
        };

        function reducer(state, action) {
            switch (action.type) {
                case ACTIONS.ADD_PRODUCT:
                    return { ...state, products: [...state.products, action.product] };
                case ACTIONS.REMOVE_PRODUCT:
                    return { ...state, products: state.products.filter((p) => p.id !== action.id) };
                case ACTIONS.UPDATE_PRODUCT:
                    return { ...state, products: state.products.map((p) => p.id === action.id ? { ...p, ...action.updates, counts: action.updates.preset ? countsFromPreset(action.updates.preset) : p.counts } : p) };
                case ACTIONS.SET_LIST:
                    return { ...state, [action.key]: action.list };
                case ACTIONS.ADD_ROLL_COST:
                    return { ...state, rollCosts: [...state.rollCosts, action.rollCost] };
                case ACTIONS.SET_VALUE:
                    return { ...state, [action.key]: action.value };
                case ACTIONS.ADD_ORDER:
                    return { ...state, orders: [...state.orders, action.order] };
                case ACTIONS.UPDATE_ORDER:
                    return { ...state, orders: state.orders.map((o) => o.id === action.id ? { ...o, ...action.updates } : o) };
                case ACTIONS.DELETE_ORDER:
                    return { ...state, orders: state.orders.filter((o) => o.id !== action.id) };
                case ACTIONS.BULK_MARK_PAID:
                    return { ...state, orders: state.orders.map((o) => action.ids.includes(o.id) ? { ...o, status: "Paid", paidOn: action.paidOn || utils.now(), payoutId: action.payoutId } : o) };
                case ACTIONS.INITIALIZE:
                    return { ...state, ...action.payload };
                default:
                    return state;
            }
        }

        const migrateState = (raw) => {
            const state = { ...defaultState, ...(raw || {}) };
            if (!Array.isArray(state.products)) state.products = [];
            if (!Array.isArray(state.rollCosts)) state.rollCosts = [...defaultState.rollCosts];
            if (!Array.isArray(state.orders)) state.orders = [];
            if (!Array.isArray(state.brands) || !state.brands.length) {
                state.brands = [...CONSTANTS.DEFAULT_BRANDS];
            }
            if (!Array.isArray(state.styles) || !state.styles.length) {
                state.styles = [...CONSTANTS.DEFAULT_STYLES];
            }
            if (!state.multipliers) {
                state.multipliers = { ...DEFAULT_MULTIPLIERS };
            } else {
                state.multipliers = { ...DEFAULT_MULTIPLIERS, ...state.multipliers };
            }

            // Migrate preset names for existing products
            state.products = state.products.map(product => {
                if (product.preset === "nanoleaf-30") {
                    return { ...product, preset: "Nanoleaf Advanced" };
                }
                return product;
            });

            // Migrate existing orders to have Etsy source
            if (state.orders && Array.isArray(state.orders)) {
                let ordersUpdated = false;
                state.orders = state.orders.map(order => {
                    if (!order.source) {
                        ordersUpdated = true;
                        return { ...order, source: 'Etsy' };
                    }
                    return order;
                });
                
                // If we updated any orders, save them back to the server
                if (ordersUpdated) {
                    setTimeout(() => {
                        saveState(state);
                    }, 100);
                }
            }

            return state;
        };

        const loadState = async () => {
            try {
                const response = await fetch('/api/data');
                if (response.ok) {
                    const data = await response.json();
                    console.log("✅ Data loaded from server");
                    return migrateState(data);
    } else {
                    console.warn("Failed to load state from server:", response.status);
                    // Fallback to localStorage
                    return loadFromLocalStorage();
                }
            } catch (error) {
                console.warn("Failed to load state from server:", error);
                // Fallback to localStorage
                return loadFromLocalStorage();
            }
        };

        const loadFromLocalStorage = () => {
            try {
                const saved = localStorage.getItem(CONSTANTS.LS_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    console.log("✅ Data loaded from localStorage backup");
                    return migrateState(data);
                } else {
                    console.log("No saved data found, using defaults");
                    return { ...defaultState };
                }
            } catch (error) {
                console.error("Failed to load from localStorage:", error);
                return { ...defaultState };
            }
        };

        const saveState = async (state) => {
            try {
                // Save to server
                const response = await fetch('/api/data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(state),
                });
                if (!response.ok) {
                    throw new Error(`Server save failed: ${response.status}`);
                }
                
                // Also save to localStorage as backup
                try {
                    localStorage.setItem(CONSTANTS.LS_KEY, JSON.stringify(state));
                } catch (localError) {
                    console.warn("Failed to save to localStorage:", localError);
                }
                
                console.log("✅ Data auto-saved successfully");
                return Promise.resolve();
            } catch (error) {
                console.warn("Failed to save state to server:", error);
                // Fallback to localStorage only
                try {
                    localStorage.setItem(CONSTANTS.LS_KEY, JSON.stringify(state));
                    console.log("✅ Data saved to localStorage as backup");
                    return Promise.resolve(); // Still consider this a success
                } catch (localError) {
                    console.error("Failed to save to localStorage:", localError);
                    return Promise.reject(localError);
                }
            }
        };

        const ProductTable = memo(({ product, state, dispatch }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editFilament, setEditFilament] = useState(product.filamentPerItem);
            const [editPreset, setEditPreset] = useState(product.preset);
            const [editModel, setEditModel] = useState(product.model);
            const [editPackaging, setEditPackaging] = useState(product.packagingByCount || {});

            const latestRoll = useMemo(() => state.rollCosts[state.rollCosts.length - 1]?.value || CONSTANTS.DEFAULT_ROLL_COST, [state.rollCosts]);
            const costPerGram = useMemo(() => latestRoll / 1000, [latestRoll]);
            const mpKey = useMemo(() => ensurePresetForStyle(product.style, product.preset, state.multipliers), [product.style, product.preset, state.multipliers]);
            const multipliers = useMemo(() => state.multipliers[mpKey] || {}, [state.multipliers, mpKey]);

            const handleRemove = useCallback(() => {
                if (confirm(`Are you sure you want to remove "${product.title}"? This action cannot be undone.`)) {
                    dispatch({ type: ACTIONS.REMOVE_PRODUCT, id: product.id });
                }
            }, [dispatch, product.id, product.title]);

            const handleEdit = useCallback(() => {
                setIsEditing(true);
                setEditFilament(product.filamentPerItem);
                setEditPreset(product.preset);
                setEditModel(product.model);
                setEditPackaging(product.packagingByCount || {});
            }, [product.filamentPerItem, product.preset, product.model, product.packagingByCount]);

            const handleSave = useCallback(() => {
                const filamentValue = utils.validateNumber(editFilament);
                if (filamentValue <= 0) {
                    alert("Filament amount must be greater than 0");
                    return;
                }
                if (!editModel.trim()) {
                    alert("Model name cannot be empty");
                    return;
                }
                const updatedProduct = { ...product, model: editModel.trim(), filamentPerItem: filamentValue, preset: editPreset, packagingByCount: editPackaging };
                const newTitle = titleOf(updatedProduct);
                dispatch({ type: ACTIONS.UPDATE_PRODUCT, id: product.id, updates: { model: editModel.trim(), filamentPerItem: filamentValue, preset: editPreset, packagingByCount: editPackaging, title: newTitle } });
                setIsEditing(false);
            }, [dispatch, product.id, editFilament, editPreset, editModel, editPackaging, product]);

            const handleCancel = useCallback(() => {
                setIsEditing(false);
                setEditFilament(product.filamentPerItem);
                setEditPreset(product.preset);
                setEditModel(product.model);
                setEditPackaging(product.packagingByCount || {});
            }, [product.filamentPerItem, product.preset, product.model, product.packagingByCount]);

            const handleDuplicate = useCallback(() => {
                const duplicatedProduct = { ...product, id: utils.uid(), title: `${product.title} (Copy)`, createdOn: utils.today() };
                dispatch({ type: ACTIONS.ADD_PRODUCT, product: duplicatedProduct });
            }, [product, dispatch]);

            return (
                <div className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-gray-200">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-semibold text-xl text-green-700">{product.title}</h3>
                        <div className="flex gap-2">
                            {!isEditing ? (
                                <>
                                    <button onClick={handleEdit} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Edit</button>
                                    <button onClick={handleDuplicate} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Duplicate</button>
                                    <button onClick={handleRemove} className="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Remove</button>
                                </>
                            ) : (
                                <>
                                    <button onClick={handleSave} className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Save</button>
                                    <button onClick={handleCancel} className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors duration-200">Cancel</button>
                                </>
                            )}
                        </div>
                    </div>

                    <div className="mb-4 p-3 bg-gray-50 rounded-lg">
                        <p className="text-sm text-gray-600">
                            <span className="font-medium">Roll cost:</span> {utils.money(latestRoll)} | 
                            <span className="font-medium ml-2">Cost per gram:</span> {utils.money(costPerGram)}
                        </p>
                        {!isEditing ? (
                            <p className="text-sm text-gray-600 mt-1">
                                <span className="font-medium">Model:</span> {product.model} | 
                                <span className="font-medium ml-2">Filament per item:</span> {product.filamentPerItem}g | 
                                <span className="font-medium ml-2">Preset:</span> {product.preset}
                            </p>
                        ) : (
                            <div className="mt-2 grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Model</label>
                                    <input
                                        type="text"
                                        value={editModel}
                                        onChange={(e) => setEditModel(e.target.value)}
                                        className="w-full px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        placeholder="Enter model name"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Filament (g)</label>
                                    <input
                                        type="number"
                                        value={editFilament}
                                        onChange={(e) => setEditFilament(e.target.value)}
                                        className="w-full px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        min="0"
                                        step="0.1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-700 mb-1">Preset</label>
                                    <select
                                        value={editPreset}
                                        onChange={(e) => setEditPreset(e.target.value)}
                                        className="w-full px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    >
                                        {Object.keys(state.multipliers).map((m) => (
                                            <option key={m} value={m}>{m}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                        )}
                    </div>

                    {isEditing && (
                        <div className="mt-4 p-4 bg-blue-50 rounded-lg border border-blue-200">
                            <h4 className="text-sm font-medium text-blue-800 mb-2">Packaging by Count</h4>
                            <div className="grid grid-cols-1 gap-2">
                                {product.counts.map((count) => (
                                    <div key={count} className="flex items-center gap-2">
                                        <label className="w-12 text-xs text-gray-600">Count {count}:</label>
                                        <select
                                            value={editPackaging[count] || ''}
                                            onChange={(e) => setEditPackaging(prev => ({ ...prev, [count]: e.target.value }))}
                                            className="flex-1 px-2 py-1 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        >
                                            <option value="">Select packaging...</option>
                                            {state.packagingOptions.map((option) => (
                                                <option key={option} value={option}>{option}</option>
                                            ))}
                                        </select>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="overflow-x-auto">
                        <table className="w-full text-sm border-collapse">
                            <thead className="bg-gray-100">
                                <tr>
                                    <th className="p-3 text-left font-medium">Count</th>
                                    <th className="p-3 text-right font-medium">Per Unit</th>
                                    <th className="p-3 text-right font-medium">Total</th>
                                    <th className="p-3 text-right font-medium">With {state.globalDiscount !== undefined ? state.globalDiscount : 25}% OFF</th>
                                    <th className="p-3 text-right font-medium">Filament (g)</th>
                                    <th className="p-3 text-right font-medium">My Cost</th>
                                    <th className="p-3 text-right font-medium">Gross</th>
                                    <th className="p-3 text-left font-medium">Packaging</th>
                                </tr>
                            </thead>
                            <tbody>
                                {product.counts.map((count) => {
                                    const unitMultiplier = Number(multipliers[count] || 0);
                                    const filament = Number(((product.filamentPerItem || 0) * count).toFixed(2));
                                    const myCost = Number((filament * costPerGram).toFixed(2));
                                    const total = myCost * unitMultiplier;
                                    const discountPercentage = (state.globalDiscount !== undefined ? state.globalDiscount : 25) / 100;
                                    const discountTotal = total * (1 - discountPercentage);
                                    const gross = discountTotal - myCost;

                                    return (
                                        <tr key={count} className="border-b hover:bg-gray-50 transition-colors">
                                            <td className="p-3 font-medium">{count}</td>
                                            <td className="p-3 text-right font-medium">{utils.money(total / count)}</td>
                                            <td className="p-3 text-right font-medium">{utils.money(total)}</td>
                                            <td className="p-3 text-right text-blue-600 font-medium">{utils.money(discountTotal)}</td>
                                            <td className="p-3 text-right text-gray-600">{filament}</td>
                                            <td className="p-3 text-right text-gray-600">{utils.money(myCost)}</td>
                                            <td className="p-3 text-right text-green-600 font-medium">{utils.money(gross)}</td>
                                            <td className="p-3 text-left text-gray-700">{product.packagingByCount?.[count] || '—'}</td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        });

        const ProductsTab = ({ state, dispatch }) => {
            const [brand, setBrand] = useState("");
            const [model, setModel] = useState("");
            const [style, setStyle] = useState("");
            const [preset, setPreset] = useState("1|5|30|60|90|120");
            const [filament, setFilament] = useState("");
            const [showAddProduct, setShowAddProduct] = useState(false);
            const [filterBrand, setFilterBrand] = useState("");
            const [filterStyle, setFilterStyle] = useState("");
            const [sortBy, setSortBy] = useState("dateAdded");
            const [sortOrder, setSortOrder] = useState("desc");

            const filteredAndSortedProducts = useMemo(() => {
                let filtered = state.products.filter((p) => {
                    const matchesBrand = !filterBrand || p.brand === filterBrand;
                    const matchesStyle = !filterStyle || p.style === filterStyle;
                    return matchesBrand && matchesStyle;
                });

                return filtered.sort((a, b) => {
                    let aValue, bValue;
                    if (sortBy === "title") {
                        aValue = a.title || titleOf(a);
                        bValue = b.title || titleOf(b);
                    } else {
                        aValue = a.createdOn || "1970-01-01";
                        bValue = b.createdOn || "1970-01-01";
                    }
                    
                    if (sortOrder === "asc") {
                        return aValue > bValue ? 1 : -1;
                    } else {
                        return aValue < bValue ? 1 : -1;
                    }
                });
            }, [state.products, filterBrand, filterStyle, sortBy, sortOrder]);

            const addProduct = useCallback(() => {
                const filamentValue = utils.validateNumber(filament);
                if (filamentValue <= 0) {
                    alert("Please enter a valid filament amount");
                    return;
                }
                if (!brand.trim() || !model.trim()) {
                    alert("Please enter both brand and model");
                    return;
                }
                if (!style.trim()) {
                    alert("Please select a style");
                    return;
                }
                const product = { id: utils.uid(), brand: brand.trim(), model: model.trim(), style: style.trim(), preset, filamentPerItem: filamentValue, counts: countsFromPreset(preset), createdOn: utils.now() };
                product.title = titleOf(product);
                dispatch({ type: ACTIONS.ADD_PRODUCT, product });
                setBrand("");
                setModel("");
                setStyle("");
                setPreset("1|5|30|60|90|120");
                setFilament("");
                setShowAddProduct(false);
            }, [brand, model, style, preset, filament, dispatch]);

            const exportData = useCallback(() => {
                const dataStr = JSON.stringify(state, null, 2);
                const dataUri = "data:application/json;charset=utf-8,"+ encodeURIComponent(dataStr);
                const exportFileDefaultName = "print-calculator-data.json";
                const linkElement = document.createElement("a");
                linkElement.setAttribute("href", dataUri);
                linkElement.setAttribute("download", exportFileDefaultName);
                linkElement.click();
            }, [state]);

            const importData = useCallback((event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const imported = JSON.parse(e.target.result);
                        const migrated = migrateState(imported);
                        dispatch({ type: ACTIONS.INITIALIZE, payload: migrated });
                        alert("Data imported successfully!");
                    } catch (error) {
                        alert("Error importing data: " + error.message);
                    }
                };
                reader.readAsText(file);
            }, [dispatch]);

            const totalProducts = state.products.length;

            return (
                <div>
                    <h2 className="text-2xl font-bold mb-6 text-gray-800">Products</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-800 mb-2">Total Products</h3>
                            <p className="text-3xl font-bold text-blue-600">{totalProducts}</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-lg p-6 border border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-800 mb-2">Products by Brand</h3>
                            <div className="space-y-2">
                                {state.brands.map((brand) => {
                                    const count = state.products.filter(p => p.brand === brand).length;
                                    return (
                                        <div key={brand} className="flex justify-between items-center">
                                            <span className="text-gray-600">{brand}</span>
                                            <span className="font-semibold text-gray-800">{count}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="bg-orange-50 rounded-xl shadow-lg p-6 border border-orange-200">

        const PackagingTab = ({ state, dispatch }) => {
            const packagingData = useMemo(() => {
                const data = {};
                state.products.forEach(product => {
                    const title = product.title || titleOf(product);
                    const parts = title.split(' — ');
                    if (parts.length >= 2) {
                        const brandPart = parts[0]; // e.g., "Govee Pro"
                        const stylePart = parts[1]; // e.g., "Regular"
                        
                        if (!data[brandPart]) {
                            data[brandPart] = {
                                counts: new Set(),
                                styles: {}
                            };
                        }
                        
                        if (product.counts) {
                            product.counts.forEach(count => {
                                data[brandPart].counts.add(count);
                            });
                        }
                        
                        if (!data[brandPart].styles[stylePart]) {
                            data[brandPart].styles[stylePart] = {};
                        }
                        
                        if (product.packagingByCount) {
                            data[brandPart].styles[stylePart] = {
                                ...data[brandPart].styles[stylePart],
                                ...product.packagingByCount
                            };
                        }
                    }
                });
                
                // Convert Sets to sorted arrays
                Object.keys(data).forEach(brand => {
                    data[brand].counts = Array.from(data[brand].counts).sort((a, b) => a - b);
                });
                
                return data;
            }, [state.products]);

                "OR-ENV": "9x6x2",

                    "OR-ENV": "bg-orange-200",
                    "BLK-ENV": "bg-gray-800 text-white",
                    "6x6x6": "bg-white border-2 border-gray-300",
                    "7x7x7": "bg-white border-2 border-gray-300",
                    "18x12x2": "bg-white border-2 border-gray-300"

                return colors[packaging] || "bg-gray-100";

            return (

                    {Object.keys(packagingData).length === 0 ? (

                    ) : (
                        Object.entries(packagingData).map(([brandName, brandData]) => (
                            <div key={brandName} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-gray-200">
                                <div className="mb-4">
                                    <h3 className="text-xl font-semibold text-gray-800">{brandName}</h3>
                                </div>
                                
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm border-collapse">
                                        <thead className="bg-gray-100">
                                            <tr>
                                                <th className="p-3 text-left font-medium">Style</th>
                                                {brandData.counts.map(count => (
                                                    <th key={count} className="p-3 text-center font-medium">{count}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {Object.entries(brandData.styles).map(([styleName, packagingByCount]) => (
                                                <tr key={styleName} className="border-b hover:bg-gray-50 transition-colors">
                                                    <td className="p-3 font-medium">{styleName}</td>
                                                    {brandData.counts.map(count => {
                                                        const packaging = packagingByCount[count];
                                                        return (
                                                            <td key={count} className="p-3 text-center">
                                                                {packaging ? (
                                                                    <span className={`inline-block px-2 py-1 rounded text-xs font-medium ${getPackagingColor(packaging)}`}>
                                                                        {packaging}
                                                                    </span>
                                                                ) : (
                                                                    <span className="text-gray-400">—</span>
                                                                )}
                                                            </td>

                                                    })}

                                    </table>
                                </div>

                        ))
                    )}
                </div>
            );
        };

        const OrdersTab = ({ state, dispatch }) => {
            const [selectedOrderIds, setSelectedOrderIds] = useState(new Set());
            const [source, setSource] = useState("Etsy");
            const [orderNumber, setOrderNumber] = useState("");
            const [etsyPayout, setEtsyPayout] = useState("");
            const [shippingCost, setShippingCost] = useState("");
            const [orderItems, setOrderItems] = useState([{ id: utils.uid(), product: "", count: "", quantity: 1 }]);
            const [expandedPayouts, setExpandedPayouts] = useState(new Set());
            
            // Edit order state
            const [editingOrder, setEditingOrder] = useState(null);
            const [editSource, setEditSource] = useState("Etsy");
            const [editOrderNumber, setEditOrderNumber] = useState("");
            const [editEtsyPayout, setEditEtsyPayout] = useState("");
            const [editShippingCost, setEditShippingCost] = useState("");
            const [editOrderItems, setEditOrderItems] = useState([]);
            
            // Add order section visibility
            const [showAddOrder, setShowAddOrder] = useState(false);
            
            // Ensure orders array exists
            const orders = state.orders || [];
            
            const toggleOrderSelection = useCallback((orderId) => {
                setSelectedOrderIds(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(orderId)) {
                        newSet.delete(orderId);
    } else {
                        newSet.add(orderId);
                    }
                    return newSet;
                });
            }, []);

            const addOrderItem = useCallback(() => {
                setOrderItems(prev => [...prev, { id: utils.uid(), product: "", count: "", quantity: 1 }]);
            }, []);

            const removeOrderItem = useCallback((itemId) => {
                if (orderItems.length > 1) {
                    setOrderItems(prev => prev.filter(item => item.id !== itemId));
                }
            }, [orderItems.length]);

            const updateOrderItem = useCallback((itemId, field, value) => {
                setOrderItems(prev => prev.map(item => 
                    item.id === itemId ? { ...item, [field]: value } : item
                ));
            }, []);

            // Filter orders into paid and unpaid
            const unpaidOrders = useMemo(() => {
                return orders.filter(order => order.status !== 'Paid');
            }, [orders]);

            const paidOrders = useMemo(() => {
                return orders.filter(order => order.status === 'Paid');
            }, [orders]);

            // Sort orders by creation timestamp (newest at bottom for unpaid orders)
            const sortedUnpaidOrders = useMemo(() => {
                return [...unpaidOrders].sort((a, b) => new Date(a.createdOn || a.created || '') - new Date(b.createdOn || b.created || ''));
            }, [unpaidOrders]);

            // Get the visually last order (furthest down on screen)
            const visuallyLastOrder = useMemo(() => {
                if (sortedUnpaidOrders.length > 0) {
                    // If there are unpaid orders, return the last one in the list (newest unpaid)
                    return sortedUnpaidOrders[sortedUnpaidOrders.length - 1];
                } else if (paidOrders.length > 0) {
                    // If no unpaid orders, return the last paid order
                    return paidOrders[paidOrders.length - 1];
                }
                return null;
            }, [sortedUnpaidOrders, paidOrders]);

            const togglePayoutExpansion = useCallback((payoutKey) => {
                setExpandedPayouts(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(payoutKey)) {
                        newSet.delete(payoutKey);
                    } else {
                        newSet.add(payoutKey);
                    }
                    return newSet;
                });
            }, []);

            // Group paid orders by payoutId (each bulk mark paid creates a separate payout)
            const payoutsByDate = useMemo(() => {
                const grouped = {};
                paidOrders.forEach(order => {
                    // Use payoutId for grouping, fallback to paidOn date for legacy orders
                    const payoutKey = order.payoutId || (order.paidOn ? order.paidOn.slice(0, 10) : utils.today());
                    if (!grouped[payoutKey]) {
                        // Extract date from paidOn timestamp for display
                        const displayDate = order.paidOn ? order.paidOn.slice(0, 10) : utils.today();
                        grouped[payoutKey] = {
                            payoutId: order.payoutId,
                            date: displayDate,
                            orders: [],
                            totalEtsyPayout: 0,
                            totalTjShare: 0,
                            totalJoshShare: 0,
                            totalProductionCost: 0
                        };
                    }
                    grouped[payoutKey].orders.push(order);
                    grouped[payoutKey].totalEtsyPayout += order.etsyPayout || 0;
                    grouped[payoutKey].totalTjShare += order.tjShare || 0;
                    grouped[payoutKey].totalJoshShare += order.joshShare || 0;
                    grouped[payoutKey].totalProductionCost += order.productionCost || 0;
                });
                return Object.values(grouped).sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [paidOrders]);

            const bulkMarkPaid = useCallback(() => {
                if (selectedOrderIds.size === 0) {
                    alert("Please select at least one order to mark as paid");
                    return;
                }
                if (confirm(`Are you sure you want to mark ${selectedOrderIds.size} order(s) as paid?`)) {
                    const currentTime = utils.now();
                    const payoutId = utils.uid(); // Generate unique ID for this payout batch
                    dispatch({ type: ACTIONS.BULK_MARK_PAID, ids: Array.from(selectedOrderIds), paidOn: currentTime, payoutId: payoutId });
                    setSelectedOrderIds(new Set());
                }
            }, [selectedOrderIds, dispatch]);

            const addOrder = useCallback(() => {
                if (!orderNumber.trim() || !etsyPayout || !shippingCost) {
                    alert("Please fill in order number, etsy payout, and shipping cost");
                    return;
                }

                // Validate all order items
                for (const item of orderItems) {
                    if (!item.product || !item.count || !item.quantity) {
                        alert("Please fill in all product fields for each line item");
                        return;
                    }
                }
                
                const payout = parseFloat(etsyPayout);
                const shipping = parseFloat(shippingCost);
                const latestRoll = state.rollCosts[state.rollCosts.length - 1]?.value || CONSTANTS.DEFAULT_ROLL_COST;
                const costPerGram = latestRoll / 1000;
                
                // Calculate totals for all line items
                let totalProductionCost = 0;
                const items = [];
                
                for (const item of orderItems) {
                    const product = state.products.find(p => p.id === item.product);
                    if (!product) continue;
                    
                    const count = parseInt(item.count);
                    const quantity = parseInt(item.quantity);
                    const totalCount = count * quantity;
                    
                    const filament = Number(((product.filamentPerItem || 0) * totalCount).toFixed(2));
                    const productionCost = Number((filament * costPerGram).toFixed(2));
                    totalProductionCost += productionCost;
                    
                    items.push({
                        id: utils.uid(),
                        productId: product.id,
                        productTitle: product.title,
                        count: count,
                        quantity: quantity,
                        totalCount: totalCount,
                        productionCost: productionCost
                    });
                }
                
                // Calculate TJ and Josh shares for the entire order
                const profit = payout - shipping - totalProductionCost;
                const tjProfitShare = profit * CONSTANTS.TJ_SHARE_PERCENTAGE;
                const joshProfitShare = profit * (1 - CONSTANTS.TJ_SHARE_PERCENTAGE);
                
                // TJ gets 70% of profit PLUS production cost
                const tjShare = tjProfitShare + totalProductionCost;
                // Josh gets 30% of profit
                const joshShare = joshProfitShare;
                
                const order = {
                    id: utils.uid(),
                    source: source,
                    orderNumber: orderNumber.trim(),
                    etsyPayout: payout,
                    shippingCost: shipping,
                    productionCost: totalProductionCost,
                    tjShare: tjShare,
                    joshShare: joshShare,
                    items: items,
                    status: "Unpaid",
                    createdOn: utils.now()
                };
                
                dispatch({ type: ACTIONS.ADD_ORDER, order });
                setOrderNumber("");
                setEtsyPayout("");
                setShippingCost("");
                setOrderItems([{ id: utils.uid(), product: "", count: "", quantity: 1 }]);
                setShowAddOrder(false);
                alert("Order added successfully!");
            }, [source, orderNumber, etsyPayout, shippingCost, orderItems, state.products, state.rollCosts, dispatch]);

            const deleteOrder = useCallback((orderId) => {
                if (confirm("Are you sure you want to delete this order?")) {
                    dispatch({ type: ACTIONS.DELETE_ORDER, id: orderId });
                }
            }, [dispatch]);

            const markOrderPaid = useCallback((orderId) => {
                const payoutId = utils.uid(); // Generate unique ID for this individual payment
                dispatch({ type: ACTIONS.UPDATE_ORDER, id: orderId, updates: { status: "Paid", paidOn: utils.now(), payoutId: payoutId } });
            }, [dispatch]);

            // ShipStation API lookup function
            const lookupShippingCost = useCallback(async (orderNumber) => {
                if (!orderNumber || orderNumber.length < 3) return; // Don't lookup for very short inputs
                
                setShippingCostLoading(true);
                setShippingCostError('');
                
                try {
                    const response = await fetch(`/api/shipstation/order/${encodeURIComponent(orderNumber)}`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                        }
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || `HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    setShippingCost(data.shippingCost.toFixed(2));
                    
                    // Auto-expand the order details section after successful lookup
                    console.log('Auto-expanding order details section...');
                    setShowAddOrder(true);
                    
                    console.log(`Shipping cost lookup successful for order ${orderNumber}: $${data.shippingCost.toFixed(2)}`);
                    
                } catch (error) {
                    console.error('Shipping cost lookup failed:', error);
                    setShippingCostError(error.message || 'Failed to lookup shipping cost');
                    
                    // Still auto-expand even if lookup fails, so user can enter shipping cost manually
                    console.log('Auto-expanding order details section despite lookup failure...');
                    setShowAddOrder(true);
                } finally {
                    setShippingCostLoading(false);
                }
            }, []);

            const startEditOrder = useCallback((order) => {
                setEditingOrder(order);
                setEditSource(order.source || 'Etsy');
                setEditOrderNumber(order.orderNumber || '');
                setEditEtsyPayout(order.etsyPayout || '');
                setEditShippingCost(order.shippingCost || '');
                setEditOrderItems(order.items || [{ productTitle: order.product || 'Legacy Product', count: order.count || 0, quantity: 1 }]);
            }, []);

            const cancelEditOrder = useCallback(() => {
                setEditingOrder(null);
                setEditSource('Etsy');
                setEditOrderNumber('');
                setEditEtsyPayout('');
                setEditShippingCost('');
                setEditOrderItems([]);
            }, []);

            const saveEditOrder = useCallback(() => {
                if (!editOrderNumber.trim() || !editEtsyPayout || !editShippingCost) {
                    alert("Please fill in order number, payout, and shipping cost");
                    return;
                }

                const payout = parseFloat(editEtsyPayout);
                const shipping = parseFloat(editShippingCost);
                const latestRoll = state.rollCosts[state.rollCosts.length - 1]?.value || CONSTANTS.DEFAULT_ROLL_COST;
                const costPerGram = latestRoll / 1000;
                
                // Calculate totals for all line items
                let totalProductionCost = 0;
                const items = [];
                
                for (const item of editOrderItems) {
                    const product = state.products.find(p => p.id === item.productId);
                    if (!product) continue;
                    
                    const count = parseInt(item.count);
                    const quantity = parseInt(item.quantity);
                    const totalCount = count * quantity;
                    
                    const filament = Number(((product.filamentPerItem || 0) * totalCount).toFixed(2));
                    const productionCost = Number((filament * costPerGram).toFixed(2));
                    totalProductionCost += productionCost;
                    
                    items.push({
                        id: item.id || utils.uid(),
                        productId: product.id,
                        productTitle: product.title,
                        count: count,
                        quantity: quantity,
                        totalCount: totalCount,
                        productionCost: productionCost
                    });
                }
                
                // Calculate TJ and Josh shares for the entire order
                const profit = payout - shipping - totalProductionCost;
                const tjProfitShare = profit * CONSTANTS.TJ_SHARE_PERCENTAGE;
                const joshProfitShare = profit * (1 - CONSTANTS.TJ_SHARE_PERCENTAGE);
                
                // TJ gets 70% of profit PLUS production cost
                const tjShare = tjProfitShare + totalProductionCost;
                // Josh gets 30% of profit
                const joshShare = joshProfitShare;
                
                dispatch({ 
                    type: ACTIONS.UPDATE_ORDER, 
                    id: editingOrder.id, 
                    updates: { 
                        source: editSource,
                        orderNumber: editOrderNumber.trim(),
                        etsyPayout: payout,
                        shippingCost: shipping,
                        productionCost: totalProductionCost,
                        tjShare: tjShare,
                        joshShare: joshShare,
                        items: items
                    } 
                });
                
                cancelEditOrder();
                alert("Order updated successfully!");
            }, [editSource, editOrderNumber, editEtsyPayout, editShippingCost, editOrderItems, editingOrder, state.products, state.rollCosts, dispatch]);

            const totalTjShare = useMemo(() => {
                return orders.reduce((sum, order) => sum + (order.tjShare || 0), 0);
